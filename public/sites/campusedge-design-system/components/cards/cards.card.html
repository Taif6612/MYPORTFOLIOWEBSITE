<!-- @dsCard group="Components" viewport="700x460" name="Program & Faculty Cards" subtitle="Program tiles, feature tiles, stat counters" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--surface-subtle); font-family: var(--font-sans); padding: 26px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; align-items: start; }
  .stats { display: flex; gap: 40px; margin-top: 24px; padding: 22px 26px; background: var(--navy-900); border-radius: var(--radius-lg); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { ProgramCard, FeatureCard, StatCounter } = window.CampusEdgeDesignSystem_cec608;
  function Demo() {
    return (
      <div>
        <div className="grid">
          <ProgramCard
            image="https://images.unsplash.com/photo-1581092160562-40aa08e78837?w=600&q=80"
            title="Computer Science" degree="B.Sc" duration="4 Years"
            blurb="Algorithms, AI and systems with a year in industry."
            icon="fa-solid fa-microchip" />
          <FeatureCard icon="fa-solid fa-award" title="Accredited Programs">
            Internationally recognised degrees across every faculty.
          </FeatureCard>
          <FeatureCard icon="fa-solid fa-handshake-angle" title="Industry Partnerships" accent>
            300+ partner organisations for placements and research.
          </FeatureCard>
        </div>
        <div className="stats">
          <StatCounter value={15000} suffix="+" label="Students" onDark />
          <StatCounter value={500} suffix="+" label="Faculty" onDark />
          <StatCounter value={95} suffix="%" label="Employment" onDark />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
