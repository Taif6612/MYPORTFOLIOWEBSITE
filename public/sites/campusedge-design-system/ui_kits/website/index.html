<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CampusEdge Institute — Where Education Meets Innovation</title>
<meta name="description" content="CampusEdge Institute empowers future leaders through world-class education, research and leadership development. Explore 100+ accredited programs." />

<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; scroll-padding-top: 90px; }
  body { margin: 0; background: var(--surface-page); color: var(--text-body);
    font-family: var(--font-sans); -webkit-font-smoothing: antialiased;
    transition: background var(--dur-base) var(--ease-out); overflow-x: hidden; }
  img { display: block; }
  a { -webkit-tap-highlight-color: transparent; }

  /* Scroll reveal */
  [data-reveal] { opacity: 0; transform: translateY(26px);
    transition: opacity .7s var(--ease-out), transform .7s var(--ease-out); }
  [data-reveal].ce-revealed { opacity: 1; transform: none; }

  @keyframes ce-load { from { width: 0 } to { width: 100% } }
  @keyframes ce-pulse { 0%,100% { transform: scale(1); opacity: 1 } 50% { transform: scale(.9); opacity: .6 } }
  @keyframes ce-bob { 0%,100% { transform: translateY(0) } 50% { transform: translateY(6px) } }

  @media (prefers-reduced-motion: reduce) {
    [data-reveal] { opacity: 1 !important; transform: none !important; }
    html { scroll-behavior: auto; }
  }

  /* Responsive */
  @media (max-width: 960px) {
    .ce-navlinks { display: none !important; }
    .ce-apply-desktop { display: none !important; }
    .ce-hamburger { display: grid !important; place-items: center; }
    .ce-faq-grid, .ce-contact-grid, .ce-news-grid { grid-template-columns: 1fr !important; }
    .ce-footer-grid { grid-template-columns: 1fr 1fr !important; }
    .ce-campus-grid { grid-template-columns: repeat(2, 1fr) !important; }
  }
  @media (max-width: 560px) {
    .ce-footer-grid { grid-template-columns: 1fr !important; }
    .ce-campus-grid > div { grid-column: span 2 !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<!-- Components (standalone Babel — does not depend on _ds_bundle.js) -->
<script type="text/babel" src="components.jsx"></script>

<!-- Demo content -->
<script src="site-data.js"></script>

<!-- Page sections (order matters: Shared first, SiteApp last) -->
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="site-chrome.jsx"></script>
<script type="text/babel" src="hero-stats.jsx"></script>
<script type="text/babel" src="programs-admissions.jsx"></script>
<script type="text/babel" src="why-campus-faculty.jsx"></script>
<script type="text/babel" src="research-tour.jsx"></script>
<script type="text/babel" src="stories-events.jsx"></script>
<script type="text/babel" src="faq-news-contact.jsx"></script>
<script type="text/babel" src="site-app.jsx"></script>
</body>
</html>
