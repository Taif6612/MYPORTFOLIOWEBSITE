<!-- @dsCard group="Colors" viewport="700x190" name="Brand Palette" subtitle="Navy anchor · royal blue action · heritage gold accent" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--surface-page); padding:22px; }
  .grid { display:flex; gap:14px; flex-wrap:wrap; }
  .sw { width:150px; }
  .chip { height:64px; border-radius:var(--radius-md); box-shadow: inset 0 0 0 1px rgba(10,26,63,.08); }
  .nm { font-size:13px; font-weight:600; color:var(--text-strong); margin-top:9px; }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); }
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--navy-900)"></div><div class="nm">Brand Navy</div><div class="hex">--navy-900 · #0a1a3f</div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-700)"></div><div class="nm">Navy 700</div><div class="hex">--navy-700 · #173a7e</div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-600)"></div><div class="nm">Royal Blue</div><div class="hex">--blue-600 · #1f5bdb</div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-400)"></div><div class="nm">Blue 400</div><div class="hex">--blue-400 · #6f9df6</div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-500)"></div><div class="nm">Heritage Gold</div><div class="hex">--gold-500 · #e0b443</div></div>
  </div>
</body></html>
