<!-- @dsCard group="Type" viewport="700x200" name="Display — Spectral" subtitle="Scholarly high-contrast serif for headlines" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--surface-page); padding:26px; }
  .big { font-family:var(--font-display); font-weight:700; font-size:54px; line-height:1.02; letter-spacing:-.02em; color:var(--text-strong); margin:0; }
  .sub { font-family:var(--font-display); font-weight:400; font-style:italic; font-size:24px; color:var(--blue-600); margin:10px 0 0; }
  .meta { font-family:var(--font-mono); font-size:11px; letter-spacing:.06em; color:var(--text-muted); margin-top:14px; }
</style></head>
<body>
  <p class="big">Where Education<br/>Meets Innovation</p>
  <p class="sub">Empowering future leaders</p>
  <div class="meta">SPECTRAL · 300–800 · ROMAN + ITALIC</div>
</body></html>
