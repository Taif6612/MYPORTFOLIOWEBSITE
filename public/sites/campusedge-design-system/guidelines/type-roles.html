<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--surface-page); padding:26px; display:flex; flex-direction:column; gap:16px; }
  .eyebrow { font-family:var(--font-mono); font-size:14px; font-weight:500; letter-spacing:.16em; text-transform:uppercase; color:var(--action-primary); }
  .body { font-family:var(--font-sans); font-size:16px; line-height:1.7; color:var(--text-body); max-width:560px; }
  .data { font-family:var(--font-mono); font-size:15px; color:var(--text-strong); }
</style></head>
<body>
  <div class="eyebrow">— Academic Programs</div>
  <div class="body">Preparing students for global success through world-class education, research, and leadership development across eight faculties.</div>
  <div class="data">15,000+ students · 95% employment · est. 1962</div>
</body></html>
