<!-- @dsCard group="Type" viewport="700x320" name="Type Scale" subtitle="5xl → xs · display serif headings, sans body" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--surface-page); padding:24px; }
  .r { display:flex; align-items:baseline; gap:18px; padding:7px 0; border-bottom:1px solid var(--border-subtle); }
  .r:last-child{border-bottom:none;}
  .tok { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); width:120px; flex-shrink:0; }
  .ex { font-family:var(--font-display); font-weight:600; color:var(--text-strong); line-height:1.1; }
</style></head>
<body>
  <div class="r"><span class="tok">3xl · 48</span><span class="ex" style="font-size:48px">Excellence</span></div>
  <div class="r"><span class="tok">2xl · 36</span><span class="ex" style="font-size:36px">Academic Programs</span></div>
  <div class="r"><span class="tok">xl · 28</span><span class="ex" style="font-size:28px">Admissions Process</span></div>
  <div class="r"><span class="tok">lg · 22</span><span class="ex" style="font-size:22px">Faculty of Engineering</span></div>
  <div class="r"><span class="tok">base · 16</span><span class="ex" style="font-size:16px;font-family:var(--font-sans);font-weight:400;color:var(--text-body)">Body copy uses Plus Jakarta Sans for clarity.</span></div>
  <div class="r"><span class="tok">sm · 14</span><span class="ex" style="font-size:14px;font-family:var(--font-sans);font-weight:400;color:var(--text-muted)">Supporting detail and captions.</span></div>
</body></html>
