<!-- @dsCard group="Colors" viewport="700x180" name="Semantic & Status" subtitle="Aliases that components actually reference" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--surface-page); padding:22px; display:flex; gap:30px; flex-wrap:wrap; }
  .col { display:flex; flex-direction:column; gap:10px; }
  .item { display:flex; align-items:center; gap:11px; }
  .dot { width:30px; height:30px; border-radius:8px; box-shadow: inset 0 0 0 1px rgba(10,26,63,.1); }
  .t { font-family:var(--font-mono); font-size:12px; color:var(--text-body); }
</style></head>
<body>
  <div class="col">
    <div class="item"><span class="dot" style="background:var(--action-primary)"></span><span class="t">--action-primary</span></div>
    <div class="item"><span class="dot" style="background:var(--action-accent)"></span><span class="t">--action-accent</span></div>
    <div class="item"><span class="dot" style="background:var(--surface-tint)"></span><span class="t">--surface-tint</span></div>
    <div class="item"><span class="dot" style="background:var(--text-strong)"></span><span class="t">--text-strong</span></div>
  </div>
  <div class="col">
    <div class="item"><span class="dot" style="background:var(--success)"></span><span class="t">--success</span></div>
    <div class="item"><span class="dot" style="background:var(--warning)"></span><span class="t">--warning</span></div>
    <div class="item"><span class="dot" style="background:var(--danger)"></span><span class="t">--danger</span></div>
    <div class="item"><span class="dot" style="background:var(--info)"></span><span class="t">--info</span></div>
  </div>
</body></html>
