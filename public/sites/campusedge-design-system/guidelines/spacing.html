<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--surface-page); padding:24px; display:flex; align-items:flex-end; gap:16px; }
  .b { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .bar { background:var(--blue-600); border-radius:4px; width:26px; }
  .lab { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
</style></head>
<body>
  <div class="b"><div class="bar" style="height:4px"></div><span class="lab">1·4</span></div>
  <div class="b"><div class="bar" style="height:8px"></div><span class="lab">2·8</span></div>
  <div class="b"><div class="bar" style="height:12px"></div><span class="lab">3·12</span></div>
  <div class="b"><div class="bar" style="height:16px"></div><span class="lab">4·16</span></div>
  <div class="b"><div class="bar" style="height:24px"></div><span class="lab">5·24</span></div>
  <div class="b"><div class="bar" style="height:32px"></div><span class="lab">6·32</span></div>
  <div class="b"><div class="bar" style="height:48px"></div><span class="lab">7·48</span></div>
  <div class="b"><div class="bar" style="height:64px"></div><span class="lab">8·64</span></div>
  <div class="b"><div class="bar" style="height:96px"></div><span class="lab">9·96</span></div>
</body></html>
